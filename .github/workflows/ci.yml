name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (verifies requirements are CI-installable)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax-check all analysis scripts
        run: python -m py_compile scripts/*.py

      - name: Validate committed Master CSV
        run: pip install pytest && pytest tests/ -v
